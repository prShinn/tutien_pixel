<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/fonts.css" />
  </head>
  <body>
    <script src="./js/auth.js"></script>
    <script src="./js/api_service.js"></script>
    <div id="canvas-area">
      <canvas id="game-canvas"></canvas>
      <div id="map-name-overlay"></div>
      <div id="conn-badge" class="offline">● Offline</div>
    </div>
    <script src="./js/map.js"></script>
    <script>
      function showScreen(name) {
        document.getElementById("screen-auth").classList.add("hidden");
        document.getElementById("screen-create").classList.add("hidden");
        document.getElementById("screen-game").style.display = "none";
        if (name === "auth")
          document.getElementById("screen-auth").classList.remove("hidden");
        else if (name === "create")
          document.getElementById("screen-create").classList.remove("hidden");
        else if (name === "game")
          document.getElementById("screen-game").style.display = "grid";
      }
    </script>
  </body>
</html>
